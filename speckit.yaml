version: 1

goals:
  - Scaffold a spec-first ticket triage dashboard from the PRD (damian-month1-spec.md)
  - All code generated by Claude Code — no manual edits until Deliverable 4

tasks:
  - id: T1
    story: S-001
    prompt: >
      Read docs/spec/prd.md. Generate prisma/schema.prisma with a Ticket model
      that has fields: id (Int autoincrement PK), title (String), priority
      (enum: P0 P1 P2), owner (String nullable), status (String default "open"),
      createdAt (DateTime default now). Match FR-1 through FR-5 exactly.
      Do not add any fields not in the PRD.
    files:
      - prisma/schema.prisma

  - id: T2
    story: S-002
    depends_on: [T1]
    prompt: >
      Read prisma/schema.prisma and docs/spec/prd.md.
      Generate a Prisma seed script at prisma/seed.ts that inserts 12 realistic
      PMO tickets — at least 3 P0, 4 P1, and 5 P2. Each ticket must have a
      title, priority, owner, and status "open". Export a main() function.
    files:
      - prisma/seed.ts

  - id: T3
    story: S-003
    depends_on: [T1]
    prompt: >
      Read docs/spec/prd.md FR-5 and prisma/schema.prisma.
      Generate src/server/routes/tickets.ts with two Next.js Route Handlers:
      GET /api/tickets — returns all tickets as a JSON array.
      PATCH /api/tickets/:id — accepts a Zod-validated body with optional fields
      priority (P0|P1|P2) and owner (string). Returns updated ticket on success
      (HTTP 200) or a structured Zod error on validation failure (HTTP 422).
      Use strict TypeScript. Zero any types.
    files:
      - src/server/routes/tickets.ts
      - src/lib/validators/ticket.ts

  - id: T4
    story: S-004
    depends_on: [T2, T3]
    prompt: >
      Read docs/spec/prd.md FR-1 and FR-2. Read src/server/routes/tickets.ts.
      Generate src/app/tickets/page.tsx as a Next.js server component that:
      1. Fetches all tickets from GET /api/tickets on the server.
      2. Groups tickets by priority (P0, P1, P2).
      3. Renders three sections, each with a heading showing "P0 (n)", "P1 (n)",
         "P2 (n)" count badges.
      4. Each ticket row shows: ID, title, priority badge, owner, status.
      Use Tailwind utility classes. No inline styles. Strict TypeScript.
    files:
      - src/app/tickets/page.tsx

  - id: T5
    story: S-005
    depends_on: [T4]
    prompt: >
      Read src/app/tickets/page.tsx and docs/spec/prd.md FR-3 and FR-4.
      Generate src/app/tickets/TicketRow.tsx as a client component ("use client")
      that renders a single ticket row. It must:
      1. Show a dropdown for priority (P0/P1/P2) — on change, call PATCH
         /api/tickets/:id with the new priority.
      2. Show an editable owner field — on blur, call PATCH /api/tickets/:id
         with the new owner value.
      3. Optimistically update the UI before the API responds.
      Use Tailwind. Strict TypeScript. Zero any types.
    files:
      - src/app/tickets/TicketRow.tsx

  - id: T6
    story: S-006
    depends_on: [T3, T4, T5]
    prompt: >
      Read src/server/routes/tickets.ts and src/app/tickets/TicketRow.tsx.
      Generate tests/tickets.smoke.test.ts using Vitest.
      Write at minimum 3 tests:
      1. GET /api/tickets returns an array with the correct shape.
      2. PATCH /api/tickets/:id with a valid body returns the updated ticket.
      3. PATCH /api/tickets/:id with an invalid priority returns HTTP 422.
      Mock the Prisma client using vi.mock. No real DB calls in tests.
    files:
      - tests/tickets.smoke.test.ts

  - id: T7
    story: S-007
    depends_on: [T1, T2, T3, T4, T5, T6]
    prompt: >
      Read all files generated so far.
      Generate .github/workflows/ci.yml that:
      1. Triggers on pull_request to main.
      2. Uses pnpm/action-setup@v4 and actions/setup-node@v4 (node 20).
      3. Caches pnpm store and Next.js build cache.
      4. Runs in order: pnpm install --frozen-lockfile, pnpm lint, pnpm typecheck,
         pnpm test, pnpm build.
      5. Entire pipeline must complete in under 3 minutes.
      Also generate README.md explaining: how to run locally, how to run the
      seed, and the single Claude Code command to regenerate the scaffold from
      the PRD.
    files:
      - .github/workflows/ci.yml
      - README.md
